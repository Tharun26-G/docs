<svg width="600" height="120" viewBox="0 0 600 120" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Gradient Definition -->
  <defs>
    <linearGradient id="mintGradient" x1="20" y1="20" x2="100" y2="100" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#2DD4BF"/> 
      <stop offset="100%" stop-color="#0F766E"/>
    </linearGradient>
  </defs>

  <!-- Logo Icon (Left Side) -->
  <g transform="translate(10, 10) scale(0.5)">
    <path d="M100 20L169.282 60V140L100 180L30.718 140V60L100 20Z" stroke="url(#mintGradient)" stroke-width="12" stroke-linejoin="round"/>
    <circle cx="100" cy="100" r="18" fill="#2DD4BF" />
    <g stroke="#14B8A6" stroke-width="4">
      <line x1="100" y1="100" x2="100" y2="50" />
      <circle cx="100" cy="45" r="7" fill="#0F766E" />
      <line x1="100" y1="100" x2="60" y2="130" />
      <circle cx="56" cy="133" r="7" fill="#0F766E" />
      <line x1="100" y1="100" x2="140" y2="130" />
      <circle cx="144" cy="133" r="7" fill="#0F766E" />
    </g>
  </g>

  <!-- Text Section -->
  <text x="120" y="55" fill="#0F766E" font-family="Arial, sans-serif" font-weight="bold" font-size="28">
    AI Engineer Documentation
  </text>
  
  <text x="120" y="85" fill="#14B8A6" font-family="Arial, sans-serif" font-weight="500" font-size="22">
    Tharun
  </text>

  <!-- Decorative Separator Line -->
  <rect x="120" y="65" width="300" height="2" rx="1" fill="#CCFBF1"/>
</svg>
