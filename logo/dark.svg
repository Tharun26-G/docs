<svg width="600" height="300" viewBox="0 0 600 300" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Define standard font for better rendering across systems -->
  <style>
    .font-sans { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; }
    .text-green { fill: #16A34A; }
    .stroke-green { stroke: #16A34A; }
  </style>
  
  <!-- LOGO ICON GROUP (Left Side) -->
  <g transform="translate(30, 40)">
    <!-- Main Hexagon Border -->
    <path class="stroke-green" d="M110.1 8.5L200.7 60.8V165.4L110.1 217.7L19.5 165.4V60.8L110.1 8.5Z" stroke-width="20" stroke-linecap="round" stroke-linejoin="round"/>
    
    <!-- Inner Structure Group -->
    <g transform="translate(110.1, 113.1)">
      <!-- Central Node -->
      <circle class="text-green" cx="0" cy="0" r="28"/>
      
      <!-- Branch Lines -->
      <line class="stroke-green" x1="0" y1="-28" x2="0" y2="-65" stroke-width="8" stroke-linecap="round"/>
      <line class="stroke-green" x1="-24.2" y1="14" x2="-56.2" y2="32.5" stroke-width="8" stroke-linecap="round"/>
      <line class="stroke-green" x1="24.2" y1="14" x2="56.2" y2="32.5" stroke-width="8" stroke-linecap="round"/>
      
      <!-- Satellite Nodes -->
      <circle class="text-green" cx="0" cy="-78.5" r="16.5"/>
      <circle class="text-green" cx="-68" cy="39.3" r="16.5"/>
      <circle class="text-green" cx="68" cy="39.3" r="16.5"/>
      
      <!-- Inner Chevron/Hex Part -->
      <path class="stroke-green" d="M-60.6 -18L0 17L60.6 -18M0 17V60" stroke-width="12" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    </g>
  </g>
  
  <!-- TEXT GROUP (Right Side) -->
  <g transform="translate(280, 80)" class="font-sans text-green">
    <!-- Title: AI Engineer Documentation -->
    <text x="0" y="0" font-size="44" font-weight="bold">AI Engineer</text>
    <text x="0" y="55" font-size="44" font-weight="bold">Documentation</text>
    
    <!-- Separator Line (Lightened version of the green for contrast) -->
    <line x1="0" y1="80" x2="330" y2="80" stroke="#BBF7D0" stroke-width="4"/>
    
    <!-- Subtitle: Tharun -->
    <text x="0" y="130" font-size="40" font-weight="normal">Tharun</text>
  </g>
</svg>
